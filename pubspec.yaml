name: hermitchat
description: Mobile client for HermitShell AI Agent OS.
publish_to: 'none'
version: 1.3.0+1

environment:
  sdk: ^3.11.3

dependencies:
  audioplayers: ^6.1.0
  crypto: ^3.0.7
  encrypt: ^5.0.3
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  google_fonts: ^6.1.0
  http: ^1.6.0
  lucide_icons: ^0.257.0
  shared_preferences: ^2.5.4
  video_player: ^2.11.1
  web_socket_channel: ^3.0.3
  webview_flutter: ^4.13.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon_hermit.png"
  adaptive_icon_background: "#10B981"
  adaptive_icon_foreground: "assets/icon_hermit.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
